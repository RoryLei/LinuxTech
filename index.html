<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux Tech - Learning Platform</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="logo">🐧 Linux Tech</h1>
      <p class="tagline">Choose a topic and start your Linux learning journey</p>
    </div>
  </header>

  <main class="container">
    <section id="topics" class="topics-grid">
      <!-- Topic blocks are rendered by JS -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; 2026 Linux Tech Learning Platform</p>
    </div>
  </footer>

  <!-- Topic modules (each folder is independent) -->
  <script src="topics/filesystem/index.js"></script>
  <script src="topics/networking/index.js"></script>
  <script src="topics/process/index.js"></script>
  <script src="topics/shell/index.js"></script>
  <script src="topics/packages/index.js"></script>
  <script src="topics/users/index.js"></script>
  <script src="topics/systemd/index.js"></script>
  <script src="topics/docker/index.js"></script>
  <script src="topics/ebpf/index.js"></script>
  <script src="topics/pcie/index.js"></script>
  <script src="topics/i2c-i3c/index.js"></script>
  <script src="topics/gpio/index.js"></script>
  <script src="topics/ethernet/index.js"></script>
  <script src="topics/sas/index.js"></script>
  <script src="topics/nvme/index.js"></script>

  <!-- Topic manifest (aggregates all modules) -->
  <script src="js/topics.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
